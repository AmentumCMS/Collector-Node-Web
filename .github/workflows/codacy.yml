# separate terms of service, privacy policy, and support
# documentation.

name: Codacy Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "22 2 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # GitHub rejects a SARIF file that contains multiple runs with the same
      # tool/category. Codacy can emit multiple runs, so split them and assign
      # stable per-run categories.
      - name: Split Codacy SARIF runs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p sarif-runs

          run_count="$(jq '.runs | length' results.sarif)"
          echo "Codacy SARIF run count: ${run_count}"

          for i in $(seq 0 $((run_count - 1))); do
            jq --argjson i "$i" '
              . as $root
              | {
                  version: $root.version,
                  "$schema": $root["$schema"],
                  runs: [
                    (
                      $root.runs[$i]
                      | .automationDetails.id = (
                          "codacy-" +
                          (
                            .tool.driver.name
                            // .tool.driver.semanticVersion
                            // "run"
                            | tostring
                            | ascii_downcase
                            | gsub("[^a-z0-9._-]+"; "-")
                          ) +
                          "-" +
                          ($i | tostring)
                        )
                    )
                  ]
                }
            ' results.sarif > "sarif-runs/codacy-${i}.sarif"
          done

          ls -la sarif-runs

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-runs
          category: codacy
