name: Codacy Security Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: ["main", "develop" ]
  schedule:
    - cron: "22 2 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      - name: Split Codacy SARIF runs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p sarif-runs

          run_count="$(jq '.runs | length' results.sarif)"
          echo "Codacy SARIF run count: ${run_count}"

          for i in $(seq 0 $((run_count - 1))); do
            jq --argjson i "$i" '
              . as $root
              | {
                  version: $root.version,
                  "$schema": $root["$schema"],
                  runs: [
                    (
                      $root.runs[$i]
                      | .automationDetails.id = (
                          "codacy-run-" + ($i | tostring)
                        )
                    )
                  ]
                }
            ' results.sarif > "sarif-runs/codacy-${i}.sarif"
          done

          echo "Generated split SARIF files:"
          ls -la sarif-runs

      - name: Upload Codacy SARIF run 0
        if: hashFiles('sarif-runs/codacy-0.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-runs/codacy-0.sarif
          category: codacy-0

      - name: Upload Codacy SARIF run 1
        if: hashFiles('sarif-runs/codacy-1.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-runs/codacy-1.sarif
          category: codacy-1

      - name: Upload Codacy SARIF run 2
        if: hashFiles('sarif-runs/codacy-2.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-runs/codacy-2.sarif
          category: codacy-2

      - name: Upload Codacy SARIF run 3
        if: hashFiles('sarif-runs/codacy-3.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-runs/codacy-3.sarif
          category: codacy-3

      - name: Upload Codacy SARIF run 4
