name: Node Collector Webclient - Main Workflow
run-name: ${{ github.actor }} is Collecting Nodi-ness🚀
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 1 * *" # Update on First of month at midnight UTC
  workflow_dispatch:

jobs:
  Setup:
    runs-on: ubuntu-latest
    outputs:
      Date: ${{ steps.date.outputs.date }}
      v18:  ${{ steps.v.outputs.v18 }}
      v20:  ${{ steps.v.outputs.v20 }}
      v22:  ${{ steps.v.outputs.v22 }}
      v24:  ${{ steps.v.outputs.v24 }}
    steps:
      - name: Get current date
        id: DATE
        run: |
          echo -n "Getting Date: "
          echo "DATE=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo -e "$DATE\nFile:\n$GITHUB_OUTPUT"
          echo -e "\nValues:"
          cat $GITHUB_OUTPUT

      - name: Get current node versions
        id: v
        run: |
          echo -e "Getting versions"

          # Fetch the Node.js version data
          node_versions=$(curl -s https://nodejs.org/dist/index.json)
          
          # Function to get the latest version for a specific major version
          get_version() { 
            major_version=$1 
            echo $node_versions |\
              jq -r --arg major_version "v$major_version" \
                '[.[] | select(.version | startswith($major_version))][0].version'
          }

          # Fetch the latest versions for v18, v20, v22, and v24
          v18=$(get_version 18)
          v20=$(get_version 20)
          v22=$(get_version 22)
          v24=$(get_version 24)

          echo "The latest Node.js v18 version is: $v18"
          echo "The latest Node.js v20 version is: $v20"
          echo "The latest Node.js v22 version is: $v22"
          echo "The latest Node.js v24 version is: $v24"

          echo "v18=${v18}" >> $GITHUB_OUTPUT
          echo "v20=${v20}" >> $GITHUB_OUTPUT
          echo "v22=${v22}" >> $GITHUB_OUTPUT
          echo "v24=${v24}" >> $GITHUB_OUTPUT

          echo -e "\nFile:\n$GITHUB_OUTPUT"
          echo "Values:"
          cat $GITHUB_OUTPUT

  Collect:
    runs-on: ubuntu-latest
    needs: [Setup]

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          submodules: true
          lfs: true

      - name: Use Node.js ${{ needs.Setup.outputs.v18 }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.Setup.outputs.v18 }}

      - name: Enable Corepack
        run: |
          echo -e "\nUpdating apt repositories"
          sudo apt-get update -y

          echo -e "\nEnabling Corepack for Yarn"
          sudo corepack enable
          echo -e "\nNode Version: $(node -v)"
          echo "Yarn version: $(yarn -v)"

      - name: Set up Git
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"

      - name: Run yarn with verdaccio
        run: |
          export XDG_DATA_HOME=$PWD

          echo -e "\nStarting Verdaccio"
          yarn dlx verdaccio >\
            verdaccio/verdaccio.log 2>\
            verdaccio/verdaccio-err.log &
          
          # Wait until Verdaccio is ready (adjust if needed)
          echo -n "Waiting for Verdaccio to be ready: "
          for i in {1..30}; do
            if curl -sw "$i " http://localhost:4873/ -o /dev/null; then break; fi
            sleep 1
          done

          echo -e "\nTailing Verdaccio startup logs (last 50 lines)"
          tail -n 50 verdaccio/verdaccio.log || true
          echo -e "\nVerdaccio errors (if any)"
          tail -n +1 verdaccio/verdaccio-err.log || true
          echo -e "\nVerdaccio is ready. Proceeding with Yarn install."

          # Create a deterministic .yarnrc.yml for Berry
          cat >> .yarnrc.yml <<'YRC'
          npmRegistryServer: "http://localhost:4873"
          YRC

          cat >> .npmrc <<'NPMRC'
          registry=http://localhost:4873
          strict-ssl=false
          NPMRC

          echo -en "\nVerify Berry sees the registry we set: "
          yarn config get npmRegistryServer

          echo -e "\nRunning Yarn"
          yarn install --refresh-lockfile
          corepack pack -o .yarn/yarn-pack.tar.gz
          
          echo -e "\nFixes for individual packages."
          curl -sSLw "Redownloaded process-0.11.10.tgz" "http://localhost:4873/process/-/process-0.11.10.tgz" \
            -o /tmp/process-0.11.10.tgz

          echo -e "\nPacking validator@0.1.1"
          npm pack validator@0.1.1

      - name: Second sweep from yarn.lock (prime Verdaccio tarball cache)
        run: bash secondary-sweep.sh

      - name: Listings
        run: |
          echo -e "\nListing verdaccio"
          tree -d verdaccio
          echo -e "\nListing Consumption"
          du -chd0 node_modules verdaccio/*

      - name: Generate app SBOM (node_modules)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: app-sbom.cdx.json
          upload-artifact: true

      - name: Scan app SBOM
        uses: anchore/scan-action@v7
        with:
          sbom: app-sbom.cdx.json
          # severity-cutoff: high
          output-format: table
          output-file: grype-report.txt

      - name: TARchive verdaccio storage directory
        run: |
          tar -cvI pigz -f ${{ vars.COLLECTOR }}-verdaccio-${{ needs.Setup.outputs.Date }}.tgz \
            verdaccio \
            | tee ${{ vars.COLLECTOR }}-verdaccio-${{ needs.Setup.outputs.Date }}.tgz.txt

      - name: TARchive verdaccio storage directory SHA HASH
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-verdaccio-${{ needs.Setup.outputs.Date }}.tgz | tee \
            ${{ vars.COLLECTOR }}-verdaccio-${{ needs.Setup.outputs.Date }}.tgz.sha

      - name: TARchive .yarn directory
        run: |
          tar -cvI pigz -f ${{ vars.COLLECTOR }}-yarn-${{ needs.Setup.outputs.Date }}.tgz \
            .yarn yarn.lock \
            | tee ${{ vars.COLLECTOR }}-yarn-${{ needs.Setup.outputs.Date }}.tgz.txt

      - name: TARchive yarn-cache storage directory SHA HASH
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-yarn-${{ needs.Setup.outputs.Date }}.tgz | tee \
            ${{ vars.COLLECTOR }}-yarn-${{ needs.Setup.outputs.Date }}.tgz.sha

      - name: Artifact Listings
        run: |
          echo -e "\nListing files\n$(ls -1Ssh)"
          echo -e "\nListing Consumption:\n$(du -chd0)"

      - name: Upload verdaccio artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-verdaccio-${{ needs.Setup.outputs.Date }}.tgz
          path: ${{ vars.COLLECTOR }}-verdaccio-${{ needs.Setup.outputs.Date }}.tgz*
          if-no-files-found: error

      - name: Upload yarn-cache artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-yarn-${{ needs.Setup.outputs.Date }}.tgz
          path: ${{ vars.COLLECTOR }}-yarn-${{ needs.Setup.outputs.Date }}.tgz*
          if-no-files-found: error

      - name: Upload Logs
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-verdaccio-logs-${{ needs.Setup.outputs.Date }}.log
          path: "verdaccio/*.log"

  MakeISO:
    runs-on: ubuntu-latest
    needs: [Setup, Collect]
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Install mkisofs
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mkisofs isomd5sum wget tree

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: ISO

      - name: Download Node Installers
        run: |
          echo -e "\nDownloading installers"
          mkdir -p ISO/runtimes
          cd ISO/runtimes
          for VERSION in ${{ needs.Setup.outputs.v18 }} ${{ needs.Setup.outputs.v20 }} ${{ needs.Setup.outputs.v22 }} ${{ needs.Setup.outputs.v24 }}; do
            echo -e "\nDownloading Node.js $VERSION"
            for FILE in x64.msi win-x64.zip linux-x64.tar.xz; do
              curl -sSLw "Downloaded node-${VERSION}-${FILE} (%{http_code}: %{size_download}B)\n"\
              https://nodejs.org/dist/latest-${VERSION%%.*}.x/node-${VERSION}-${FILE} \
                -o node-${VERSION}-${FILE}
            done
          done
          echo -e "\nListing downloaded files:\n$(ls -1Ssh)"
          echo -e "\nHashing Files:"
          sha256sum -b * | tee node_runtimes.sha

      - name: Download Yarn
        run: |
          echo -e "\nDownloading yarnpkgs:"
          mkdir -p ISO/yarnpkg
          cd ISO/yarnpkg
          for RELEASE_TAG in 4.12.0 4.10.2 4.5.3; do
            for FILE in js js.sign js.pem; do
              curl -sSLw "Downloaded yarn-$RELEASE_TAG.$FILE (%{http_code}: %{size_download}B)\n" \
                https://repo.yarnpkg.com/$RELEASE_TAG/packages/yarnpkg-cli/bin/yarn.$FILE \
                -o yarn-${RELEASE_TAG}.$FILE
            done
          done
          echo -e "\nListing downloaded files:\n$(ls -1Ssh)"
          echo -e "\nHashing Files:"
          sha256sum -b * | tee yarnpkg.sha

      - name: Copy Markdowns to ISO
        run: cp -v *.md ISO/

      - name: Show Artifacts
        run: |
          echo -e "Directory Listing:\n$(ls -1Ssh ISO)"
          echo -e "\nDirectory Size:\n$(du -chd0 ISO)"
          echo -e "\nFile structure:\n$(tree -L 3 ISO|tee ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.txt)"

      - name: Generate Comprehensive Artifacts Hash File
        run: |
          cd ISO
          sha256sum -b * vscode/* runtimes/* | tee \
            ../${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.sha
          cd -
          cp -v ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.??? ISO/

      - name: Make ISO
        run: |
          mkisofs -J -R -v -T -l \
            -V '${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}' \
            -A '${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}' \
            -o ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso \
            ISO

      - name: Implant MD5 sum into iso
        run: implantisomd5 ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso

      - name: Generate ISO Hash
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso | tee \
            ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso.sha

      - name: Show ISO & Hash
        run: ls -1Ssh *.iso*

      - name: Upload ISO
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso
          path: ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso*
          if-no-files-found: error

      - name: Upload ISO SHA
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso.sha
          path: ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso.sha
          if-no-files-found: error

  VirusScan:
    runs-on: ubuntu-latest
    needs: [Setup, MakeISO]
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso

      - name: Download TGZ artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "*-${{ needs.Setup.outputs.Date }}.tgz"

      - name: List files to scan
        run: |
          echo "Files to be scanned:"
          ls -1Ssh

      - name: Scan files for viruses
        id: virus_scan
        uses: hugoalh/scan-virus-ghaction/clamav@v0.20.1
        with:
          clamav_update: true
          found_log: true
          found_summary: true
          statistics_log: true
          statistics_summary: true

      - name: Save scan summary
        if: always()
        run: |
          echo "Virus scan completed" > ${{ vars.COLLECTOR }}-virus-scan-report-${{ needs.Setup.outputs.Date }}.txt
          echo "Scan finished: ${{ steps.virus_scan.outputs.finish }}" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ needs.Setup.outputs.Date }}.txt
          echo "Viruses found: ${{ steps.virus_scan.outputs.found }}" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ needs.Setup.outputs.Date }}.txt
          echo "" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ needs.Setup.outputs.Date }}.txt
          echo "For detailed scan results, check the job logs and step summary." >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ needs.Setup.outputs.Date }}.txt

          echo -e "\nGenerated Virus Scan Report:\n$(cat ${{ vars.COLLECTOR }}-virus-scan-report-${{ needs.Setup.outputs.Date }}.txt)"

          echo -e "\nScan Statistics:\n$(cat $GITHUB_STEP_SUMMARY)" \
          | tee ${{ vars.COLLECTOR }}-virus-scan-statistics-${{ needs.Setup.outputs.Date }}.txt

      - name: Upload virus scan report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-virus-scan-${{ needs.Setup.outputs.Date }}.txt
          path: "*virus*.txt"
          if-no-files-found: warn

  OfflineTest:
    runs-on: ubuntu-latest
    needs: [Setup, MakeISO]
    permissions:
      contents: write
      pull-requests: read
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]
    steps:
      - name: Install isomd5sum
        run: |
          sudo apt-get update -y
          sudo apt-get install -y isomd5sum

      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Download ISO and hash
        uses: actions/download-artifact@v8
        with:
          pattern: "${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso*"
          merge-multiple: true

      - name: Validate ISO Hashes
        run: |
          echo -e "List Artifacts"
          ls -Alht
          echo -e "\nCheck injected ISO MD5"
          checkisomd5 ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso
          echo -e "\nCheck ISO sha256"
          sha256sum -cw ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso.sha

      - name: Mount ISO
        run: sudo mount -v -o loop ${{ vars.COLLECTOR }}-${{ needs.Setup.outputs.Date }}.iso /mnt

      - name: UnTARchive Yarn Cache
        run: tar -xzvf /mnt/${{ vars.COLLECTOR }}-yarn-${{ needs.Setup.outputs.Date }}.tgz

      - name: Run yarn install
        run: |
          echo -e "Setup Yarn"
          sudo corepack enable
          echo -e "Configure Yarn for inaccessable network"
          npm set registry http://localhost:4873/
          yarn config set npmRegistryServer http://localhost:4873/
          echo -e "\nRun yarn install\n"
          yarn install --immutable  --immutable-cache
          corepack pack -o .yarn/yarn-pack.tar.gz

      - name: Run yarn
        run: |
          echo -e "Run Yarn"
          yarn run

  Release:
    runs-on: ubuntu-latest
    needs: [Setup, VirusScan, OfflineTest]
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Show Artifacts
        run: |
          echo -e "Directory Listing:\n$(ls -1Ssh ${{ vars.COLLECTOR }}-*.*)"
          echo -e "\nDirectory Size:\n$(du -chd0 ${{ vars.COLLECTOR }}-*.*)"
          echo -e "\nISO and TGZ files:"
          ls -1Ssh *tgz* *iso* || echo "No ISO/TGZ files found"
          echo ""
          echo "Virus scan report:"
          ls -1Ssh *virus-scan-report* || echo "No virus scan report found"

      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        id: tag_create
        with:
          tag: ${{ needs.Setup.outputs.Date }}
          github_token: ${{secrets.GITHUB_TOKEN}}
          tag_exists_error: false
          message: "Release for ${{ needs.Setup.outputs.Date }} run"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ vars.COLLECTOR }} ${{ needs.Setup.outputs.Date }}
          tag_name: ${{ needs.Setup.outputs.Date }}
          make_latest: true
          files: ${{ vars.COLLECTOR }}-*.*